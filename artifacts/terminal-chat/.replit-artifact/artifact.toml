kind = "web"
previewPath = "/"
title = "Terminal Chat"
version = "1.0.0"
id = "artifacts/terminal-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23280

[services.development]
run = "pnpm --filter @workspace/terminal-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/terminal-chat", "run", "build" ]
publicDir = "artifacts/terminal-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23280"
BASE_PATH = "/"
